<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>MNIST AI Demo</title>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0"></script>

  <style>
    body { text-align:center; font-family:Arial; }
    canvas { border:2px solid black; background:black; }
    button { margin:10px; padding:10px; }
  </style>
</head>

<body>

<h2> Vẽ số </h2>

<canvas id="canvas" width="280" height="280"></canvas>
<br>

<button onclick="predict()">Dự đoán</button>
<button onclick="clearCanvas()">Xóa</button>

<h3 id="result">Loading model...</h3>

<script>
let model;

// LOAD MODEL 
async function loadModel() {
  model = await tf.loadLayersModel(
    "https://storage.googleapis.com/tfjs-models/tfjs/mnist/model.json"
  );
  document.getElementById("result").innerText = "✅ Model loaded!";
}
loadModel();

// ===== CANVAS =====
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d", { willReadFrequently: true });

ctx.fillStyle = "black";
ctx.fillRect(0,0,280,280);

let drawing = false;

canvas.onmousedown = () => drawing = true;
canvas.onmouseup = () => drawing = false;
canvas.onmousemove = e => {
  if(!drawing) return;
  ctx.fillStyle = "white";
  ctx.beginPath();
  ctx.arc(e.offsetX, e.offsetY, 8, 0, Math.PI*2);
  ctx.fill();
};

function clearCanvas(){
  ctx.fillStyle="black";
  ctx.fillRect(0,0,280,280);
}

// ===== PREDICT =====
function predict(){
  if(!model){
    alert("Model chưa load xong!");
    return;
  }

  let img = ctx.getImageData(0,0,280,280);

  let tensor = tf.browser.fromPixels(img, 1)
    .resizeNearestNeighbor([28,28])
    .toFloat()
    .div(255.0)
    .expandDims(0);

  let pred = model.predict(tensor);
  let data = pred.dataSync();

  let digit = data.indexOf(Math.max(...data));

  document.getElementById("result").innerText =
    "👉 Dự đoán: " + digit;
}
</script>

</body>
</html>
